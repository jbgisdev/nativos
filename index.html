<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sede Nativos - Corporación de Danza</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.6s ease-out forwards;
        }

        /* El mapa ahora se ajustará de forma absoluta a su contenedor padre */
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            padding: 0;
            overflow: hidden;
        }
        .leaflet-popup-content {
            margin: 0;
            text-align: center;
        }
        .leaflet-container a.leaflet-popup-close-button {
            color: #9ca3af;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(243, 244, 246, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .leaflet-container a.leaflet-popup-close-button:hover {
            background: #e5e7eb;
            color: #1f2937;
        }
    </style>
</head>
<!-- Usamos h-[100dvh] y overflow-hidden para bloquear el scroll de la página completa -->
<body class="bg-gradient-to-br from-slate-50 via-gray-100 to-zinc-200 flex flex-col items-center justify-center h-[100dvh] overflow-hidden p-3 pt-12 sm:p-6 sm:pt-16 font-sans antialiased">

    <!-- Tarjeta principal: Le damos h-full (para que tome el 100% del espacio disponible tras el padding) y flex-col -->
    <div class="max-w-xl w-full h-full bg-white/80 backdrop-blur-xl p-1 sm:p-2 rounded-[2rem] shadow-2xl border border-white/40 animate-slide-up relative flex flex-col">
        
        <!-- Contenedor interior blanco: También h-full y flex-col -->
        <div class="bg-white rounded-[1.75rem] p-4 sm:p-6 h-full flex flex-col relative">
            
            <!-- Logo Flotante -->
            <div class="absolute -top-10 sm:-top-12 left-1/2 transform -translate-x-1/2 w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-full p-1 shadow-xl border border-gray-100 shrink-0 z-20">
                <img src="https://yt3.googleusercontent.com/Yj2LZCwer3llfD2yNpBbgdpOM1vAqBA0T5PxHkE3CqywCu5hd9KIn1id9YK7-3m5ky5itlmT8A=s160-c-k-c0x00ffffff-no-rj" 
                     alt="Nativos Logo" 
                     class="w-full h-full rounded-full object-cover">
            </div>

            <!-- Espaciador para no pisar el logo -->
            <div class="h-10 sm:h-12 shrink-0"></div>

            <!-- Encabezado (shrink-0 asegura que no se comprima) -->
            <div class="mb-4 text-center shrink-0">
                <span class="text-[10px] sm:text-xs font-bold tracking-widest text-gray-400 uppercase mb-1 block">Corporación de Danza</span>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 tracking-tight">Sede Nativos</h1>
                <div class="flex items-center justify-center gap-1 mt-1 text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <p class="text-sm font-medium">Carrera 45 # 67-25, Barranquilla</p>
                </div>
            </div>

            <!-- Contenedor del Mapa: flex-1 es la magia aquí, tomará todo el espacio restante -->
            <div class="flex-1 relative rounded-2xl overflow-hidden shadow-inner ring-1 ring-gray-100 min-h-[150px]">
                <div id="map"></div>
                <div class="absolute bottom-0 left-0 w-full h-12 bg-gradient-to-t from-black/10 to-transparent z-[400] pointer-events-none"></div>
            </div>

            <!-- Botón interactivo (shrink-0 asegura que siempre esté visible en la parte inferior) -->
            <div class="mt-4 shrink-0 flex justify-center">
                <a href="https://www.google.com/maps/dir/?api=1&destination=Carrera+45+%23+67-25,+Barranquilla,+Colombia" 
                   target="_blank" 
                   rel="noopener noreferrer" 
                   class="group relative inline-flex items-center justify-center gap-2 bg-black hover:bg-gray-800 text-white text-sm sm:text-base font-semibold py-3.5 px-6 rounded-full transition-all duration-300 shadow-[0_8px_30px_rgb(0,0,0,0.12)] hover:shadow-[0_8px_30px_rgb(0,0,0,0.2)] hover:-translate-y-1 w-full sm:w-auto">
                    
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:scale-110 group-hover:-rotate-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                    </svg>
                    Trazar ruta en Google Maps
                </a>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const lat = 10.9922; 
        const lng = -74.7952;
        const logoUrl = "https://yt3.googleusercontent.com/Yj2LZCwer3llfD2yNpBbgdpOM1vAqBA0T5PxHkE3CqywCu5hd9KIn1id9YK7-3m5ky5itlmT8A=s160-c-k-c0x00ffffff-no-rj";

        const map = L.map('map', {
            scrollWheelZoom: false,
            zoomControl: false 
        }).setView([lat, lng], 17);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 20
        }).addTo(map);

        const customMarkerHTML = `
            <div class="relative flex h-12 w-12 sm:h-14 sm:w-14 items-center justify-center group">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-black opacity-20"></span>
                <div class="relative w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full p-[2px] shadow-lg border-2 border-black transition-transform duration-300 group-hover:scale-110">
                    <img src="${logoUrl}" class="w-full h-full rounded-full object-cover" alt="Pin Nativos" />
                </div>
            </div>
        `;

        const customIcon = L.divIcon({
            className: 'bg-transparent border-none', 
            html: customMarkerHTML,
            iconSize: [48, 48],
            iconAnchor: [24, 24],
            popupAnchor: [0, -25]
        });

        const marker = L.marker([lat, lng], { icon: customIcon }).addTo(map);

        const popupContent = `
            <div class="py-2 px-4 sm:py-3 sm:px-5">
                <div class="w-6 sm:w-8 h-1 bg-gray-200 rounded-full mx-auto mb-2 sm:mb-3"></div>
                <h3 class="text-xs sm:text-sm font-bold text-gray-900 mb-1 uppercase tracking-wide">Sede Nativos</h3>
                <p class="text-[10px] sm:text-xs text-gray-500 m-0">¡Te esperamos para bailar!</p>
            </div>
        `;

        marker.bindPopup(popupContent);
        
        setTimeout(() => {
            marker.openPopup();
        }, 800);
        
        // Al usar flexbox dinámico, obligamos a Leaflet a recalcular su tamaño una vez cargado
        setTimeout(() => {
            map.invalidateSize();
        }, 100);
    </script>
</body>
</html>
